services:
  one-api:
    build: .
    container_name: one-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "30088:3000"
    volumes:
      - ./data/oneapi:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=oneapi:123456@tcp(db:3306)/one-api
      - REDIS_CONN_STRING=redis://redis
      - SESSION_SECRET=techdou_test_secret_2024
      - TZ=Asia/Shanghai
      - SYSTEM_NAME=TechDou
      # - STRIPE_SECRET_KEY=sk_test_xxx
      # - STRIPE_WEBHOOK_SECRET=whsec_xxx
      # - ALIPAY_APP_ID=2021xxx
      # - ALIPAY_PRIVATE_KEY=xxx
      # - ALIPAY_PUBLIC_KEY=xxx
      # - PAY_RATE_RMB=7.2
    depends_on:
      - redis
      - db
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' | awk -F: '{print $2}'" ]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: "${REGISTRY:-docker.io}/redis:latest"
    container_name: redis
    restart: always

  db:
    image: "${REGISTRY:-docker.io}/mysql:8.2.0"
    restart: always
    container_name: mysql
    volumes:
      - ./data/mysql:/var/lib/mysql
    ports:
      - '33088:3306'
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: 'TechDou@2024'
      MYSQL_USER: oneapi
      MYSQL_PASSWORD: '123456'
      MYSQL_DATABASE: one-api
